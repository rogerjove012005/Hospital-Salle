<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>Agenda — laSalle Health Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260516b" />
    <script src="/config.js"></script>
  </head>
  <body class="dash-body">
    <header class="site-header">
      <div class="site-header__inner">
        <a href="/landing.html" class="site-logo" aria-label="Volver al panel">
          <span class="site-logo__text">
            <span class="site-logo__title">laSalle Health Center</span>
            <span class="site-logo__subtitle" id="agendaSubtitle">Agenda</span>
          </span>
        </a>
        <nav class="site-nav" aria-label="Navegación">
          <a href="/landing.html">Panel</a>
          <a href="#agendaTop" aria-current="page">Agenda</a>
        </nav>
      </div>
    </header>

    <main class="dash portal-page" id="agendaTop">
      <section class="dash-hero portal-hero">
        <div class="dash-hero__top">
          <p class="dash-hero__eyebrow" id="agendaEyebrow">Planificación</p>
          <button id="btnLogout" class="dash-hero__logout" type="button">Cerrar sesión</button>
        </div>
        <div class="dash-hero__main">
          <div class="dash-hero__intro" style="max-width: none">
            <h1 class="dash-hero__title" id="agendaTitle">Agenda del día</h1>
            <p class="dash-hero__sub" id="agendaSub">Cargando…</p>
          </div>
        </div>
      </section>

      <article class="dash-card agenda-card">
        <header class="dash-card__head">
          <h2 class="dash-card__title" id="agendaListTitle">Citas de hoy</h2>
          <p class="dash-card__sub" id="agendaListSub">Vista demostrativa del proyecto académico.</p>
        </header>
        <ul class="agenda-list" id="agendaList" aria-label="Listado de citas"></ul>
      </article>
      <p id="status" class="portal-status" role="status" aria-live="polite"></p>
    </main>

    <script src="/portal.js"></script>
    <script src="/agenda.js"></script>
  </body>
</html>
