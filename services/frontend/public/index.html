<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Salle — Login</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="card">
      <header class="header">
        <div>
          <div class="kicker">laSalle Health Center</div>
          <h1>Iniciar sesión</h1>
          <p class="muted">Accede a tu cuenta para continuar.</p>
        </div>
      </header>

      <section class="tabs">
        <button class="tab active" id="tabLogin" type="button">Iniciar sesión</button>
        <button class="tab" id="tabRegister" type="button">Crear cuenta</button>
      </section>

      <section id="panelLogin">
        <form id="loginForm">
          <label>Email</label>
          <input name="email" type="email" autocomplete="username" placeholder="tu@email.com" required />
          <label>Contraseña</label>
          <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          <button type="submit">Entrar</button>
        </form>
      </section>

      <section id="panelRegister" class="hidden">
        <form id="registerForm">
          <label>Tipo de cuenta</label>
          <select name="role" required>
            <option value="paciente" selected>Paciente</option>
            <option value="medico">Médico</option>
          </select>

          <label>Nombre</label>
          <input name="first_name" type="text" autocomplete="given-name" required />

          <label>Apellidos</label>
          <input name="last_name" type="text" autocomplete="family-name" required />

          <label>Teléfono</label>
          <input name="phone" type="tel" autocomplete="tel" placeholder="+34 600 000 000" required />

          <label>Fecha de nacimiento</label>
          <input name="date_of_birth" type="date" required />

          <label>Sexo</label>
          <select name="sex" required>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="O">Otro / Prefiero no decir</option>
          </select>

          <label>Email</label>
          <input name="email" type="email" autocomplete="username" placeholder="paciente@email.com" required />
          <label>Contraseña</label>
          <input
            name="password"
            type="password"
            autocomplete="new-password"
            minlength="8"
            maxlength="128"
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,128}$"
            title="Mínimo 8 caracteres, con mayúscula, minúscula, número y un símbolo"
            placeholder="••••••••"
            required
          />
          <button type="submit">Crear cuenta</button>
          <p class="muted small">
            Según el tipo de cuenta: <strong>paciente</strong> recibe <code>patient_id</code> (P…);
            <strong>médico</strong> queda en la tabla de personal con <code>medico_id</code> (M…).
          </p>
        </form>
      </section>

      <section class="status">
        <div id="status" class="statusText muted" aria-live="polite"></div>
      </section>

      <section class="session hidden" id="sessionPanel">
        <div class="row">
          <button id="btnMe" class="secondary" type="button">Ver mi perfil</button>
          <button id="btnLogout" class="secondary" type="button">Cerrar sesión</button>
        </div>
        <pre id="output" class="output hidden">{}</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
