<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Salle — Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <div>
          <div class="kicker">laSalle Health Center</div>
          <h1>Iniciar sesión</h1>
          <p class="muted">Accede a tu cuenta para continuar.</p>
        </div>
      </header>

      <section class="tabs">
        <button class="tab active" id="tabLogin" type="button">Iniciar sesión</button>
        <button class="tab" id="tabRegister" type="button">Crear cuenta</button>
      </section>

      <section id="panelLogin">
        <form id="loginForm">
          <label>Email</label>
          <input name="email" type="email" placeholder="tu@email.com" required />
          <label>Contraseña</label>
          <input name="password" type="password" placeholder="••••••••" required />
          <button type="submit">Entrar</button>
        </form>
      </section>

      <section id="panelRegister" class="hidden">
        <form id="registerForm">
          <label>Email</label>
          <input name="email" type="email" placeholder="paciente@email.com" required />
          <label>Contraseña</label>
          <input name="password" type="password" placeholder="••••••••" required />
          <label>ID de paciente</label>
          <input name="patient_id" type="text" placeholder="P000001" required />
          <button type="submit">Crear cuenta</button>
          <p class="muted small">Usa el ID de paciente asignado por el hospital.</p>
        </form>
      </section>

      <section class="status">
        <div id="status" class="statusText muted" aria-live="polite"></div>
      </section>

      <section class="session hidden" id="sessionPanel">
        <div class="row">
          <button id="btnMe" class="secondary" type="button">Ver mi perfil</button>
          <button id="btnLogout" class="secondary" type="button">Cerrar sesión</button>
        </div>
        <pre id="output" class="output hidden">{}</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
