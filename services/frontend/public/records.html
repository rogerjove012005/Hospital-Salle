<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>Mi expediente — laSalle Health Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=20260516h" />
    <script src="/config.js"></script>
  </head>
  <body class="app-body" data-portal-page="records" data-portal-title="Mi expediente">
    <main class="app-main" id="recordsTop">
      <article class="portal-card clinic-card clinic-page-head">
        <header class="portal-card__head">
          <span class="portal-card__badge">Historia clínica</span>
          <h1 class="clinic-header__title">Mi expediente</h1>
          <p class="clinic-header__sub" id="recordsSub">Estudios y pruebas asociados a su ficha.</p>
        </header>
      </article>
      <article class="portal-card clinic-card dash-card">
        <header class="dash-card__head">
          <h2 class="dash-card__title">Estudios diagnósticos</h2>
          <p class="dash-card__sub">Registros desde el hospital · <code>GET /studies/me</code></p>
        </header>
        <div class="clinic-card__body">
          <ul class="records-list" id="recordsList" aria-label="Estudios del paciente"></ul>
          <p class="patients-count" id="recordsCount"></p>
        </div>
      </article>
      <p id="status" class="clinic-alert portal-status" role="status"></p>
    </main>
    <script src="/portal.js"></script>
    <script src="/records.js"></script>
  </body>
</html>
